x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.org/simple}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gemini_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-gemini_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gemini_gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_BIND_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gemini_gateway} -d ${POSTGRES_DB:-gemini_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build: *app-build
    restart: "no"
    logging: *default-logging
    environment:
      GEMINI_GATEWAY_ENVIRONMENT: ${GEMINI_GATEWAY_ENVIRONMENT:-development}
      GEMINI_GATEWAY_POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-gemini_gateway}:${POSTGRES_PASSWORD:-gemini_gateway}@postgres:5432/${POSTGRES_DB:-gemini_gateway}
      GEMINI_GATEWAY_POSTGRES_SYNC_DSN: postgresql+psycopg://${POSTGRES_USER:-gemini_gateway}:${POSTGRES_PASSWORD:-gemini_gateway}@postgres:5432/${POSTGRES_DB:-gemini_gateway}
      GEMINI_GATEWAY_ENCRYPTION_KEY: ${GEMINI_GATEWAY_ENCRYPTION_KEY:-fTypay4X7jiYzb-rZUnV74QuKmcRQev9i12cZrFI3E8=}
      GEMINI_GATEWAY_HMAC_KEY: ${GEMINI_GATEWAY_HMAC_KEY:-hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh}
      GEMINI_GATEWAY_INTERNAL_AUTH_TOKEN: ${GEMINI_GATEWAY_TOKEN:-change-me-local-token}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  seed:
    build: *app-build
    profiles: ["seed"]
    restart: "no"
    logging: *default-logging
    environment:
      GEMINI_GATEWAY_ENVIRONMENT: ${GEMINI_GATEWAY_ENVIRONMENT:-development}
      GEMINI_GATEWAY_POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-gemini_gateway}:${POSTGRES_PASSWORD:-gemini_gateway}@postgres:5432/${POSTGRES_DB:-gemini_gateway}
      GEMINI_GATEWAY_POSTGRES_SYNC_DSN: postgresql+psycopg://${POSTGRES_USER:-gemini_gateway}:${POSTGRES_PASSWORD:-gemini_gateway}@postgres:5432/${POSTGRES_DB:-gemini_gateway}
      GEMINI_GATEWAY_ENCRYPTION_KEY: ${GEMINI_GATEWAY_ENCRYPTION_KEY:-fTypay4X7jiYzb-rZUnV74QuKmcRQev9i12cZrFI3E8=}
      GEMINI_GATEWAY_HMAC_KEY: ${GEMINI_GATEWAY_HMAC_KEY:-hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh}
      GEMINI_GATEWAY_INTERNAL_AUTH_TOKEN: ${GEMINI_GATEWAY_TOKEN:-change-me-local-token}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GATEWAY_PROXY_URL: ${GEMINI_GATEWAY_PROXY_URL:-}
    depends_on:
      migrations:
        condition: service_completed_successfully
    command: ["python", "-m", "gemini_gateway.seed", "/app/config/gemini-gateway-seed.dev.yaml"]
    volumes:
      - ./config:/app/config:ro

  gateway:
    build: *app-build
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      GEMINI_GATEWAY_ENVIRONMENT: ${GEMINI_GATEWAY_ENVIRONMENT:-development}
      GEMINI_GATEWAY_POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-gemini_gateway}:${POSTGRES_PASSWORD:-gemini_gateway}@postgres:5432/${POSTGRES_DB:-gemini_gateway}
      GEMINI_GATEWAY_POSTGRES_SYNC_DSN: postgresql+psycopg://${POSTGRES_USER:-gemini_gateway}:${POSTGRES_PASSWORD:-gemini_gateway}@postgres:5432/${POSTGRES_DB:-gemini_gateway}
      GEMINI_GATEWAY_ENCRYPTION_KEY: ${GEMINI_GATEWAY_ENCRYPTION_KEY:-fTypay4X7jiYzb-rZUnV74QuKmcRQev9i12cZrFI3E8=}
      GEMINI_GATEWAY_HMAC_KEY: ${GEMINI_GATEWAY_HMAC_KEY:-hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh}
      GEMINI_GATEWAY_INTERNAL_AUTH_TOKEN: ${GEMINI_GATEWAY_TOKEN:-change-me-local-token}
      GEMINI_GATEWAY_UPSTREAM_BASE_URL: ${GEMINI_GATEWAY_UPSTREAM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      GEMINI_GATEWAY_REQUIRE_SEEDED_ROUTES: ${GEMINI_GATEWAY_REQUIRE_SEEDED_ROUTES:-true}
      GEMINI_GATEWAY_RETENTION_INTERVAL_SECONDS: ${GEMINI_GATEWAY_RETENTION_INTERVAL_SECONDS:-3600}
    depends_on:
      migrations:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${GEMINI_GATEWAY_BIND_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health/live', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
